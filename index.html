<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixly Chat Level 3</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b1220;
    display: flex;
    justify-content: center;
}

.app {
    width: 100%;
    max-width: 420px;
    height: 100vh;
    background: #111827;
    display: flex;
    flex-direction: column;
}

/* HEADER */
.header {
    background: #1f2937;
    padding: 10px;
    text-align: center;
    color: white;
    font-weight: bold;
}

/* CHAT */
.chat {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
}

.msg {
    padding: 8px 12px;
    margin: 6px 0;
    border-radius: 12px;
    max-width: 75%;
    font-size: 14px;
    position: relative;
    cursor: pointer;
    user-select: none;
}

.me {
    background: #22c55e;
    align-self: flex-end;
}

.other {
    background: #374151;
    align-self: flex-start;
}

/* REACTIONS */
.reaction {
    font-size: 14px;
    margin-top: 3px;
}

/* INPUT */
.input {
    display: flex;
    border-top: 1px solid #374151;
}

input {
    flex: 1;
    padding: 12px;
    border: none;
    background: #111827;
    color: white;
}

button {
    background: #22c55e;
    border: none;
    padding: 12px 15px;
}

/* REACTION POPUP */
.popup {
    position: absolute;
    background: #1f2937;
    padding: 8px;
    border-radius: 12px;
    display: none;
    gap: 8px;
}

.emoji {
    cursor: pointer;
    font-size: 18px;
}
</style>
</head>

<body>

<div class="app">

<div class="header">💬 Pixly Chat Level 3</div>

<div class="chat" id="chat"></div>

<div class="input">
<input id="msg" placeholder="Type message...">
<button onclick="send()">Send</button>
</div>

</div>

<!-- reaction popup -->
<div class="popup" id="popup">
    <span class="emoji" onclick="react('👍')">👍</span>
    <span class="emoji" onclick="react('❤️')">❤️</span>
    <span class="emoji" onclick="react('😂')">😂</span>
    <span class="emoji" onclick="react('🔥')">🔥</span>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
getDatabase,
ref,
push,
onChildAdded,
update
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDYuw8POzVfhxNwmiQAXf86W6RqnUhuem4",
  authDomain: "pixlychat.firebaseapp.com",
  databaseURL: "https://pixlychat-default-rtdb.firebaseio.com",
  projectId: "pixlychat",
  storageBucket: "pixlychat.firebasestorage.app",
  messagingSenderId: "930502466662",
  appId: "1:930502466662:web:278d0de81840ef005521a7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let user;
let selectedMsgId = null;

/* AUTH (simple assume logged in from Level 2) */
onAuthStateChanged(auth, (u) => {
if (u) user = u;
});

/* SEND MESSAGE */
window.send = function () {
const text = msg.value;
if (!text.trim()) return;

push(ref(db, "messages"), {
text,
email: user?.email || "guest",
reaction: ""
});

msg.value = "";
};

/* LOAD CHAT */
onChildAdded(ref(db, "messages"), (snap) => {
const d = snap.val();

const div = document.createElement("div");
div.classList.add("msg");

div.innerHTML = `
${d.text}
<div class="reaction">${d.reaction || ""}</div>
`;

div.oncontextmenu = (e) => {
e.preventDefault();
showPopup(e.pageX, e.pageY, snap.key);
};

div.ontouchstart = () => {
let hold = setTimeout(() => {
showPopup(event.touches[0].pageX, event.touches[0].pageY, snap.key);
}, 500);

div.ontouchend = () => clearTimeout(hold);
};

chat.appendChild(div);
chat.scrollTop = chat.scrollHeight;
});

/* POPUP */
function showPopup(x, y, id) {
selectedMsgId = id;

popup.style.left = x + "px";
popup.style.top = y + "px";
popup.style.display = "flex";
}

/* REACT */
window.react = function (emoji) {
update(ref(db, "messages/" + selectedMsgId), {
reaction: emoji
});

popup.style.display = "none";
};

document.addEventListener("click", () => {
popup.style.display = "none";
});
</script>

</body>
</html>
