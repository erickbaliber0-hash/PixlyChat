<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixly Chat Pro</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b1220;
    display: flex;
    justify-content: center;
}

.app {
    width: 100%;
    max-width: 420px;
    height: 100vh;
    background: #111827;
    display: flex;
    flex-direction: column;
}

.header {
    background: #1f2937;
    padding: 10px;
    color: white;
    text-align: center;
    font-weight: bold;
}

.onlineList {
    font-size: 12px;
    opacity: 0.8;
}

.chat {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
}

.msg {
    padding: 8px 12px;
    margin: 5px 0;
    border-radius: 12px;
    max-width: 75%;
    font-size: 14px;
}

.me {
    background: #22c55e;
    align-self: flex-end;
}

.other {
    background: #374151;
    align-self: flex-start;
}

.user {
    font-size: 10px;
    opacity: 0.7;
}

.input {
    display: flex;
    border-top: 1px solid #374151;
}

input {
    flex: 1;
    padding: 10px;
    border: none;
    background: #111827;
    color: white;
}

button {
    background: #22c55e;
    border: none;
    padding: 10px 15px;
}

.login {
    width: 100%;
    max-width: 420px;
    padding: 20px;
    text-align: center;
    color: white;
}

.profile {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
}

img {
    width: 30px;
    height: 30px;
    border-radius: 50%;
}
</style>
</head>

<body>

<div class="login" id="loginBox">
    <h3>Login</h3>
    <input id="email" placeholder="Email"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>
    <button onclick="login()">Login</button>
    <button onclick="register()">Create Account</button>
</div>

<div class="app" id="app" style="display:none;">

<div class="header">
💬 Pixly Chat
<div class="onlineList" id="onlineList">Loading online users...</div>
</div>

<div class="chat" id="chat"></div>

<div class="input">
<input id="msg" placeholder="Type message...">
<button onclick="send()">Send</button>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
getDatabase,
ref,
push,
onChildAdded,
set,
onValue
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDYuw8POzVfhxNwmiQAXf86W6RqnUhuem4",
  authDomain: "pixlychat.firebaseapp.com",
  databaseURL: "https://pixlychat-default-rtdb.firebaseio.com",
  projectId: "pixlychat",
  storageBucket: "pixlychat.firebasestorage.app",
  messagingSenderId: "930502466662",
  appId: "1:930502466662:web:278d0de81840ef005521a7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let user = null;

/* ================= LOGIN ================= */
window.login = function () {
const email = emailInput();
const pass = passInput();

signInWithEmailAndPassword(auth, email, pass);
};

window.register = function () {
const email = emailInput();
const pass = passInput();

createUserWithEmailAndPassword(auth, email, pass);
};

function emailInput() {
return document.getElementById("email").value;
}
function passInput() {
return document.getElementById("password").value;
}

/* ================= AUTH ================= */
onAuthStateChanged(auth, (u) => {
if (u) {
user = u;

document.getElementById("loginBox").style.display = "none";
document.getElementById("app").style.display = "flex";

setOnline();
loadChat();
loadOnlineUsers();
}
});

/* ================= ONLINE USERS ================= */
function setOnline() {
set(ref(db, "status/" + user.uid), {
email: user.email,
state: "online"
});
}

function loadOnlineUsers() {
onValue(ref(db, "status"), (snap) => {
const data = snap.val() || {};
let list = "🟢 Online: ";

Object.values(data).forEach(u => {
if (u.state === "online") {
list += u.email + " ";
}
});

document.getElementById("onlineList").innerText = list;
});
}

/* ================= CHAT ================= */
window.send = function () {
const text = document.getElementById("msg").value;
if (!text.trim()) return;

push(ref(db, "messages"), {
text: text,
email: user.email,
uid: user.uid,
time: new Date().toLocaleTimeString()
});

document.getElementById("msg").value = "";
};

function loadChat() {
onChildAdded(ref(db, "messages"), (snap) => {
const d = snap.val();

const div = document.createElement("div");
div.classList.add("msg");

if (d.uid === user.uid) {
div.classList.add("me");
} else {
div.classList.add("other");
}

div.innerHTML = `
<div class="user">${d.email}</div>
${d.text}
`;

document.getElementById("chat").appendChild(div);
document.getElementById("chat").scrollTop = chat.scrollHeight;
});
}
</script>

</body>
    </html>
