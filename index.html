<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pixly Chat Full</title>

<style>
body {
    font-family: Arial;
    background: #0b1220;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
}

.box {
    width: 370px;
    height: 560px;
    background: #111827;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.header {
    background: #1f2937;
    padding: 10px;
    text-align: center;
    font-weight: bold;
}

.auth {
    padding: 15px;
}

input {
    width: 100%;
    margin: 5px 0;
    padding: 10px;
    border: none;
    background: #0f172a;
    color: white;
    border-radius: 8px;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    background: #22c55e;
    border: none;
    cursor: pointer;
    border-radius: 8px;
}

.chat {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
}

.msg {
    padding: 8px 12px;
    margin: 5px 0;
    border-radius: 12px;
    max-width: 75%;
    font-size: 14px;
}

.me {
    background: #22c55e;
    align-self: flex-end;
}

.other {
    background: #374151;
    align-self: flex-start;
}

.time {
    font-size: 9px;
    opacity: 0.6;
    text-align: right;
}

.input {
    display: flex;
    border-top: 1px solid #374151;
}

.input input {
    flex: 1;
    border-radius: 0;
}

.logout {
    background: #ef4444;
}
</style>
</head>

<body>

<div class="box">

<div class="header">💬 Pixly Chat</div>

<!-- AUTH -->
<div class="auth" id="authBox">
    <h3>Login / Register</h3>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="register()">Create Account</button>
    <button onclick="login()">Login</button>
</div>

<!-- CHAT -->
<div id="app" style="display:none; flex:1; flex-direction:column;">

<div class="chat" id="chat"></div>

<div class="input">
    <input id="msg" placeholder="Type message...">
    <button onclick="send()">Send</button>
</div>

<button class="logout" onclick="logout()">Logout</button>

</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
getDatabase,
ref,
push,
onChildAdded
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// 🔑 CONFIG (your Firebase)
const firebaseConfig = {
  apiKey: "AIzaSyDYuw8POzVfhxNwmiQAXf86W6RqnUhuem4",
  authDomain: "pixlychat.firebaseapp.com",
  databaseURL: "https://pixlychat-default-rtdb.firebaseio.com",
  projectId: "pixlychat",
  storageBucket: "pixlychat.firebasestorage.app",
  messagingSenderId: "930502466662",
  appId: "1:930502466662:web:278d0de81840ef005521a7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let user = null;

// REGISTER
window.register = function () {
const email = emailInput();
const pass = passInput();

createUserWithEmailAndPassword(auth, email, pass)
.catch(e => alert(e.message));
};

// LOGIN
window.login = function () {
const email = emailInput();
const pass = passInput();

signInWithEmailAndPassword(auth, email, pass)
.catch(e => alert(e.message));
};

// LOGOUT
window.logout = function () {
signOut(auth);
};

// AUTH STATE
onAuthStateChanged(auth, (u) => {
if (u) {
user = u;

document.getElementById("authBox").style.display = "none";
document.getElementById("app").style.display = "flex";

loadChat();
}
});

// SEND
window.send = function () {
const text = document.getElementById("msg").value;
if (!text.trim()) return;

push(ref(db, "messages"), {
text: text,
email: user.email,
time: new Date().toLocaleTimeString()
});

document.getElementById("msg").value = "";
};

// LOAD CHAT
function loadChat() {
onChildAdded(ref(db, "messages"), (snap) => {
const d = snap.val();

const div = document.createElement("div");
div.classList.add("msg");

if (d.email === user.email) {
div.classList.add("me");
} else {
div.classList.add("other");
}

div.innerHTML = `
<b>${d.email}</b><br>
${d.text}
<div class="time">${d.time}</div>
`;

document.getElementById("chat").appendChild(div);
document.getElementById("chat").scrollTop = chat.scrollHeight;
});
}

// helpers
function emailInput() {
return document.getElementById("email").value;
}
function passInput() {
return document.getElementById("password").value;
}
</script>

</body>
    </html>
