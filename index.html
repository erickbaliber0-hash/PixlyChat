<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PixlyChat</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #000;
    display: flex;
    justify-content: center;
}

.app {
    width: 100%;
    max-width: 420px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: #000;
}

/* HEADER */
.header {
    background: #000;
    color: white;
    padding: 12px;
    border-bottom: 1px solid #222;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.title {
    font-weight: bold;
}

.logout {
    background: red;
    border: none;
    color: white;
    padding: 6px 10px;
    border-radius: 10px;
    cursor: pointer;
}

/* CHAT */
.chat {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.msg {
    max-width: 75%;
    padding: 10px 12px;
    border-radius: 18px;
    font-size: 14px;
    word-wrap: break-word;
}

.me {
    align-self: flex-end;
    background: #3797f0;
    color: white;
    border-bottom-right-radius: 4px;
}

.other {
    align-self: flex-start;
    background: #262626;
    color: white;
    border-bottom-left-radius: 4px;
}

/* INPUT */
.input {
    display: flex;
    padding: 10px;
    border-top: 1px solid #222;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 20px;
    border: none;
    outline: none;
    background: #262626;
    color: white;
}

button {
    margin-left: 8px;
    background: #3797f0;
    border: none;
    color: white;
    padding: 10px 14px;
    border-radius: 20px;
}

/* LOGIN */
.login {
    width: 100%;
    max-width: 420px;
    padding: 20px;
    color: white;
    text-align: center;
}

.login input {
    width: 100%;
    margin: 5px 0;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: #111;
    color: white;
}

.login button {
    width: 100%;
    margin-top: 8px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="loginBox">
    <h2>Pixly Chat Login</h2>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="register()">Create Account</button>
    <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div class="app" id="app" style="display:none;">

<div class="header">
    <div class="title">💬 Pixly Chat</div>
    <button class="logout" onclick="logout()">Logout</button>
</div>

<div class="chat" id="chat"></div>

<div class="input">
    <input id="msg" placeholder="Message...">
    <button onclick="send()">Send</button>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
getDatabase,
ref,
push,
onChildAdded
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDYuw8POzVfhxNwmiQAXf86W6RqnUhuem4",
  authDomain: "pixlychat.firebaseapp.com",
  databaseURL: "https://pixlychat-default-rtdb.firebaseio.com",
  projectId: "pixlychat",
  storageBucket: "pixlychat.firebasestorage.app",
  messagingSenderId: "930502466662",
  appId: "1:930502466662:web:278d0de81840ef005521a7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let user = null;

/* LOGIN */
window.login = function () {
signInWithEmailAndPassword(auth,
email.value,
password.value
).catch(e => alert(e.message));
};

/* REGISTER */
window.register = function () {
createUserWithEmailAndPassword(auth,
email.value,
password.value
).catch(e => alert(e.message));
};

/* LOGOUT */
window.logout = function () {
signOut(auth);
};

/* AUTH STATE */
onAuthStateChanged(auth, (u) => {
if (u) {
user = u;

loginBox.style.display = "none";
app.style.display = "flex";

loadChat();
} else {
loginBox.style.display = "block";
app.style.display = "none";
}
});

/* SEND MESSAGE */
window.send = function () {
if (!user) return;

const text = msg.value;
if (!text.trim()) return;

push(ref(db, "messages"), {
text,
email: user.email,
uid: user.uid
});

msg.value = "";
};

/* LOAD CHAT */
function loadChat() {
onChildAdded(ref(db, "messages"), (snap) => {
const d = snap.val();

const div = document.createElement("div");
div.classList.add("msg");

if (user && d.uid === user.uid) {
div.classList.add("me");
} else {
div.classList.add("other");
}

div.innerText = d.text || "";

chat.appendChild(div);

const chatBox = document.getElementById("chat");
chatBox.scrollTop = chatBox.scrollHeight;
});
}
</script>

</body>
</html>
