<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PixlySocial | Pro</title>
<style>
    :root {
        --bg: #000;
        --surface: #121212;
        --border: #262626;
        --blue: #0095f6;
        --text: #fff;
        --text-dim: #a8a8a8;
        --me-gradient: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
    }

    body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; justify-content: center; overflow: hidden; }
    
    /* Login Screen */
    #auth-screen { position: fixed; inset: 0; z-index: 100; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.3s; }
    .auth-box { width: 85%; max-width: 300px; text-align: center; }
    .input { width: 100%; background: var(--surface); border: 1px solid var(--border); padding: 12px; margin-bottom: 10px; border-radius: 8px; color: white; box-sizing: border-box; outline: none; }
    .btn { width: 100%; background: var(--blue); border: none; padding: 12px; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }

    /* App Layout */
    .app { width: 100%; max-width: 450px; height: 100vh; display: flex; flex-direction: column; border-left: 1px solid var(--border); border-right: 1px solid var(--border); background: #000; position: relative; }
    
    .header { padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .header b { font-size: 18px; font-style: italic; }

    /* Nav Tabs */
    .tabs { display: flex; border-bottom: 1px solid var(--border); background: #000; }
    .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-size: 12px; font-weight: bold; color: var(--text-dim); text-transform: uppercase; }
    .tab.active { color: var(--text); border-bottom: 2px solid var(--text); }

    .content-area { flex: 1; overflow-y: auto; padding-bottom: 20px; }
    .content-area::-webkit-scrollbar { width: 0; }

    /* Feed Post Style */
    .post-box { background: var(--surface); margin: 10px; padding: 15px; border-radius: 12px; border: 1px solid var(--border); }
    .post-item { padding: 15px; border-bottom: 1px solid var(--border); }
    .post-user { font-weight: bold; margin-bottom: 5px; color: var(--blue); }
    .post-text { font-size: 14px; line-height: 1.4; }

    /* User Item Style */
    .user-item { padding: 12px 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #121212; }
    .user-info { display: flex; align-items: center; gap: 12px; }
    .avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--me-gradient); display: flex; align-items: center; justify-content: center; font-weight: bold; }
    .follow-btn { background: var(--blue); color: #fff; border: none; padding: 6px 12px; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; }
    .follow-btn.following { background: var(--border); color: gray; }

    /* Chat Screen (Overlay) */
    #chat-screen { position: absolute; inset: 0; background: #000; z-index: 60; display: none; flex-direction: column; }
    .chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
    .msg-wrapper { display: flex; flex-direction: column; max-width: 75%; }
    .msg-wrapper.me { align-self: flex-end; }
    .msg-wrapper.other { align-self: flex-start; }
    .msg { padding: 10px 16px; border-radius: 20px; font-size: 14px; }
    .me .msg { background: var(--me-gradient); border-bottom-right-radius: 4px; }
    .other .msg { background: var(--border); border-bottom-left-radius: 4px; }
</style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-box">
        <h1 style="font-style: italic; font-size: 35px; margin-bottom: 10px;">PixlySocial</h1>
        <p style="color: gray; margin-bottom: 20px;">Connect with everyone.</p>
        <input id="reg-user" class="input" placeholder="Username">
        <input id="reg-email" class="input" placeholder="Email">
        <input id="reg-pass" class="input" type="password" placeholder="Password">
        <button class="btn" onclick="handleAuth()">Join Pixly</button>
    </div>
</div>

<div class="app">
    <div class="header">
        <b id="display-name">PixlySocial</b>
        <button onclick="logout()" style="background:none; border:none; color:red; cursor:pointer; font-size:12px;">Logout</button>
    </div>

    <div class="tabs">
        <div class="tab active" id="t-feed" onclick="switchTab('feed')">Feed</div>
        <div class="tab" id="t-discover" onclick="switchTab('discover')">Follow</div>
        <div class="tab" id="t-msgs" onclick="switchTab('msgs')">Inbox</div>
    </div>

    <div class="content-area">
        <div id="sec-feed">
            <div class="post-box">
                <textarea id="post-input" placeholder="What's on your mind?" style="width:100%; background:none; border:none; color:white; outline:none; resize:none; font-size:14px;"></textarea>
                <button onclick="createPost()" class="btn" style="width:auto; padding: 5px 15px; margin-top:10px; font-size:12px; float:right;">Post</button>
                <div style="clear:both;"></div>
            </div>
            <div id="feed-list"></div>
        </div>

        <div id="sec-discover" style="display:none;"></div>

        <div id="sec-msgs" style="display:none;"></div>
    </div>

    <div id="chat-screen">
        <div class="header">
            <button onclick="closeChat()" style="background:none; border:none; color:var(--blue); font-size:20px;">←</button>
            <b id="chat-title">Chat</b>
            <div style="width:20px;"></div>
        </div>
        <div class="chat-window" id="chat-window"></div>
        <div style="padding:15px; border-top:1px solid var(--border);">
            <div style="display:flex; background:var(--surface); border-radius:25px; padding:5px 15px;">
                <input id="msg-input" placeholder="Message..." style="flex:1; background:none; border:none; color:white; padding:10px; outline:none;">
                <button onclick="sendMsg()" style="background:none; border:none; color:var(--blue); font-weight:bold;">Send</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set, push, onChildAdded, onValue, off } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDYuw8POzVfhxNwmiQAXf86W6RqnUhuem4",
        authDomain: "pixlychat.firebaseapp.com",
        databaseURL: "https://pixlychat-default-rtdb.firebaseio.com",
        projectId: "pixlychat",
        storageBucket: "pixlychat.firebasestorage.app",
        messagingSenderId: "930502466662",
        appId: "1:930502466662:web:278d0de81840ef005521a7"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    let currentUser, chatRoomID, chatRef;

    /* AUTH */
    window.handleAuth = async () => {
        const u = document.getElementById("reg-user").value;
        const e = document.getElementById("reg-email").value;
        const p = document.getElementById("reg-pass").value;
        try { await signInWithEmailAndPassword(auth, e, p); } 
        catch {
            const res = await createUserWithEmailAndPassword(auth, e, p);
            await set(ref(db, 'users/' + res.user.uid), { username: u || e.split('@')[0], uid: res.user.uid });
        }
    };
    window.logout = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            document.getElementById("auth-screen").style.opacity = "0";
            setTimeout(() => document.getElementById("auth-screen").style.display = "none", 300);
            loadAppData();
        } else {
            document.getElementById("auth-screen").style.display = "flex";
            document.getElementById("auth-screen").style.opacity = "1";
        }
    });

    function loadAppData() {
        onValue(ref(db, 'users/' + currentUser.uid), s => {
            document.getElementById("display-name").innerText = s.val()?.username || "PixlySocial";
        });
        loadFeed();
        loadDiscover();
        loadInbox();
    }

    /* TABS */
    window.switchTab = (id) => {
        const sections = ['feed', 'discover', 'msgs'];
        sections.forEach(s => {
            document.getElementById('sec-' + s).style.display = s === id ? 'block' : 'none';
            document.getElementById('t-' + s).className = 'tab ' + (s === id ? 'active' : '');
        });
    };

    /* FEED */
    window.createPost = () => {
        const txt = document.getElementById("post-input").value;
        if(!txt.trim()) return;
        push(ref(db, 'posts'), {
            user: document.getElementById("display-name").innerText,
            text: txt,
            uid: currentUser.uid,
            time: Date.now()
        });
        document.getElementById("post-input").value = "";
    };

    function loadFeed() {
        const fList = document.getElementById("feed-list");
        onValue(ref(db, 'posts'), snap => {
            fList.innerHTML = "";
            const posts = [];
            snap.forEach(s => { posts.unshift(s.val()); }); // Newest first
            posts.forEach(p => {
                fList.innerHTML += `<div class="post-item"><div class="post-user">@${p.user}</div><div class="post-text">${p.text}</div></div>`;
            });
        });
    }

    /* FOLLOW & INBOX */
    function loadDiscover() {
        onValue(ref(db, 'users'), snap => {
            const disc = document.getElementById("sec-discover");
            disc.innerHTML = "";
            snap.forEach(s => {
                if(s.key !== currentUser.uid) {
                    const u = s.val();
                    disc.innerHTML += `
                        <div class="user-item">
                            <div class="user-info"><div class="avatar">${u.username[0]}</div><b>${u.username}</b></div>
                            <button class="follow-btn" id="f-${s.key}" onclick="toggleFollow('${s.key}')">Follow</button>
                        </div>`;
                    checkFollow(s.key);
                }
            });
        });
    }

    function checkFollow(id) {
        onValue(ref(db, `following/${currentUser.uid}/${id}`), s => {
            const b = document.getElementById('f-' + id);
            if(b) { b.innerText = s.val() ? "Following" : "Follow"; b.className = s.val() ? "follow-btn following" : "follow-btn"; }
        });
    }

    window.toggleFollow = (id) => {
        const refF = ref(db, `following/${currentUser.uid}/${id}`);
        onValue(refF, s => { set(refF, s.val() ? null : true); }, {onlyOnce: true});
    };

    function loadInbox() {
        onValue(ref(db, `following/${currentUser.uid}`), snap => {
            const inbox = document.getElementById("sec-msgs");
            inbox.innerHTML = "";
            snap.forEach(s => {
                onValue(ref(db, 'users/' + s.key), uSnap => {
                    const u = uSnap.val();
                    const d = document.createElement("div");
                    d.className = "user-item";
                    d.onclick = () => openChat(u);
                    d.innerHTML = `<div class="user-info"><div class="avatar">${u.username[0]}</div><b>${u.username}</b></div>`;
                    inbox.appendChild(d);
                });
            });
        });
    }

    /* PRIVATE CHAT */
    window.openChat = (target) => {
        const ids = [currentUser.uid, target.uid].sort();
        chatRoomID = ids[0] + "_" + ids[1];
        document.getElementById("chat-title").innerText = target.username;
        document.getElementById("chat-screen").style.display = "flex";
        document.getElementById("chat-window").innerHTML = "";
        if(chatRef) off(chatRef);
        chatRef = ref(db, 'p_msgs/' + chatRoomID);
        onChildAdded(chatRef, s => {
            const m = s.val();
            const w = document.createElement("div");
            w.className = `msg-wrapper ${m.s === currentUser.uid ? 'me' : 'other'}`;
            w.innerHTML = `<div class="msg">${m.t}</div>`;
            document.getElementById("chat-window").appendChild(w);
            document.getElementById("chat-window").scrollTop = document.getElementById("chat-window").scrollHeight;
        });
    };

    window.closeChat = () => document.getElementById("chat-screen").style.display = "none";
    window.sendMsg = () => {
        const i = document.getElementById("msg-input");
        if(!i.value.trim()) return;
        push(ref(db, 'p_msgs/' + chatRoomID), { t: i.value, s: currentUser.uid });
        i.value = "";
    };
</script>
</body>
        </html>
