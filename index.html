<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PixlyChat</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #000;
    display: flex;
    justify-content: center;
}

/* PHONE FRAME */
.app {
    width: 100%;
    max-width: 420px;
    height: 100vh;
    background: #000;
    display: flex;
    flex-direction: column;
}

/* HEADER (Instagram style) */
.header {
    background: #000;
    color: white;
    padding: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #222;
}

.header-title {
    font-weight: bold;
}

.online {
    font-size: 11px;
    color: #aaa;
}

/* CHAT AREA */
.chat {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

/* MESSAGE ROW */
.msg {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    max-width: 80%;
}

/* PROFILE CIRCLE */
.pfp {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: gray;
}

/* MESSAGE BUBBLES */
.bubble {
    padding: 10px 12px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.3;
}

/* OTHER USER */
.other {
    align-self: flex-start;
}

.other .bubble {
    background: #262626;
    color: white;
    border-bottom-left-radius: 4px;
}

/* ME */
.me {
    align-self: flex-end;
    flex-direction: row-reverse;
}

.me .bubble {
    background: #3797f0;
    color: white;
    border-bottom-right-radius: 4px;
}

/* TIME */
.time {
    font-size: 9px;
    color: #777;
    margin-top: 3px;
}

/* INPUT BAR (Instagram DM style) */
.input {
    display: flex;
    padding: 10px;
    border-top: 1px solid #222;
    background: #000;
    position: sticky;
    bottom: 0;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 20px;
    border: none;
    outline: none;
    background: #262626;
    color: white;
}

button {
    margin-left: 8px;
    background: #3797f0;
    border: none;
    color: white;
    padding: 10px 14px;
    border-radius: 20px;
}
</style>
</head>

<body>

<div class="app">

<!-- HEADER -->
<div class="header">
    <div class="header-title">PixlyChat</div>
    <div class="online" id="online">● online</div>
</div>

<!-- CHAT -->
<div class="chat" id="chat"></div>

<!-- INPUT -->
<div class="input">
    <input id="msg" placeholder="Message...">
    <button onclick="send()">Send</button>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
getDatabase,
ref,
push,
onChildAdded,
set,
onValue,
update
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDYuw8POzVfhxNwmiQAXf86W6RqnUhuem4",
  authDomain: "pixlychat.firebaseapp.com",
  databaseURL: "https://pixlychat-default-rtdb.firebaseio.com",
  projectId: "pixlychat",
  storageBucket: "pixlychat.firebasestorage.app",
  messagingSenderId: "930502466662",
  appId: "1:930502466662:web:278d0de81840ef005521a7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let user;

/* ================= AUTH ================= */
onAuthStateChanged(auth, (u) => {
if (u) {
user = u;

setOnline();
loadChat();
loadTyping();
}
});

/* ================= ONLINE STATUS ================= */
function setOnline() {
set(ref(db, "status/" + user.uid), {
email: user.email,
state: "online"
});
}

/* ================= CHAT ================= */
window.send = function () {
const text = document.getElementById("msg").value;
if (!text.trim()) return;

push(ref(db, "messages"), {
text,
email: user.email,
uid: user.uid,
time: new Date().toLocaleTimeString(),
seen: false
});

document.getElementById("msg").value = "";
};

/* ================= LOAD CHAT ================= */
function loadChat() {
onChildAdded(ref(db, "messages"), (snap) => {
const d = snap.val();

const div = document.createElement("div");
div.classList.add("msg");

if (d.uid === user.uid) {
div.classList.add("me");
} else {
div.classList.add("other");

update(ref(db, "messages/" + snap.key), {
seen: true
});
}

div.innerHTML = `
<div class="meta">${d.email}</div>
${d.text}
<div class="status">${d.seen ? "Seen" : "Delivered"}</div>
`;

document.getElementById("chat").appendChild(div);
document.getElementById("chat").scrollTop = chat.scrollHeight;
});
}

/* ================= ONLINE USERS ================= */
onValue(ref(db, "status"), (snap) => {
const data = snap.val() || {};
let count = 0;

Object.values(data).forEach(u => {
if (u.state === "online") count++;
});

document.getElementById("online").innerText =
"🟢 Online Users: " + count;
});

/* ================= TYPING INDICATOR ================= */
let typingTimeout;

document.getElementById("msg").addEventListener("input", () => {
set(ref(db, "typing/" + user.uid), {
email: user.email
});

clearTimeout(typingTimeout);

typingTimeout = setTimeout(() => {
set(ref(db, "typing/" + user.uid), null);
}, 1000);
});

function loadTyping() {
onValue(ref(db, "typing"), (snap) => {
const data = snap.val() || {};
let txt = "";

Object.values(data).forEach(u => {
if (u.email !== user.email) {
txt += u.email + " is typing...";
}
});

document.getElementById("typing").innerText = txt;
});
}
</script>

</body>
</html>
