<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixly Chat</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b1220;
    display: flex;
    justify-content: center;
}

.app {
    width: 100%;
    max-width: 420px;
    height: 100vh;
    background: #111827;
    display: flex;
    flex-direction: column;
}

.header {
    background: #1f2937;
    padding: 10px;
    color: white;
    text-align: center;
    font-weight: bold;
}

.sub {
    font-size: 11px;
    opacity: 0.7;
}

.chat {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
}

.msg {
    padding: 8px 12px;
    margin: 5px 0;
    border-radius: 12px;
    max-width: 75%;
    font-size: 14px;
    position: relative;
}

.me {
    background: #22c55e;
    align-self: flex-end;
}

.other {
    background: #374151;
    align-self: flex-start;
}

.meta {
    font-size: 10px;
    opacity: 0.7;
}

.status {
    font-size: 10px;
    text-align: right;
    opacity: 0.6;
}

.input {
    display: flex;
    border-top: 1px solid #374151;
}

input {
    flex: 1;
    padding: 10px;
    border: none;
    background: #111827;
    color: white;
}

button {
    background: #22c55e;
    border: none;
    padding: 10px 15px;
}

.typing {
    font-size: 11px;
    opacity: 0.6;
    padding: 5px;
}
</style>
</head>

<body>

<div class="app">

<div class="header">
💬 Pixly Chat
<div class="sub" id="online">Loading...</div>
<div class="typing" id="typing"></div>
</div>

<div class="chat" id="chat"></div>

<div class="input">
<input id="msg" placeholder="Type message...">
<button onclick="send()">Send</button>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
getDatabase,
ref,
push,
onChildAdded,
set,
onValue,
update
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDYuw8POzVfhxNwmiQAXf86W6RqnUhuem4",
  authDomain: "pixlychat.firebaseapp.com",
  databaseURL: "https://pixlychat-default-rtdb.firebaseio.com",
  projectId: "pixlychat",
  storageBucket: "pixlychat.firebasestorage.app",
  messagingSenderId: "930502466662",
  appId: "1:930502466662:web:278d0de81840ef005521a7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let user;

/* ================= AUTH ================= */
onAuthStateChanged(auth, (u) => {
if (u) {
user = u;

setOnline();
loadChat();
loadTyping();
}
});

/* ================= ONLINE STATUS ================= */
function setOnline() {
set(ref(db, "status/" + user.uid), {
email: user.email,
state: "online"
});
}

/* ================= CHAT ================= */
window.send = function () {
const text = document.getElementById("msg").value;
if (!text.trim()) return;

push(ref(db, "messages"), {
text,
email: user.email,
uid: user.uid,
time: new Date().toLocaleTimeString(),
seen: false
});

document.getElementById("msg").value = "";
};

/* ================= LOAD CHAT ================= */
function loadChat() {
onChildAdded(ref(db, "messages"), (snap) => {
const d = snap.val();

const div = document.createElement("div");
div.classList.add("msg");

if (d.uid === user.uid) {
div.classList.add("me");
} else {
div.classList.add("other");

update(ref(db, "messages/" + snap.key), {
seen: true
});
}

div.innerHTML = `
<div class="meta">${d.email}</div>
${d.text}
<div class="status">${d.seen ? "Seen" : "Delivered"}</div>
`;

document.getElementById("chat").appendChild(div);
document.getElementById("chat").scrollTop = chat.scrollHeight;
});
}

/* ================= ONLINE USERS ================= */
onValue(ref(db, "status"), (snap) => {
const data = snap.val() || {};
let count = 0;

Object.values(data).forEach(u => {
if (u.state === "online") count++;
});

document.getElementById("online").innerText =
"🟢 Online Users: " + count;
});

/* ================= TYPING INDICATOR ================= */
let typingTimeout;

document.getElementById("msg").addEventListener("input", () => {
set(ref(db, "typing/" + user.uid), {
email: user.email
});

clearTimeout(typingTimeout);

typingTimeout = setTimeout(() => {
set(ref(db, "typing/" + user.uid), null);
}, 1000);
});

function loadTyping() {
onValue(ref(db, "typing"), (snap) => {
const data = snap.val() || {};
let txt = "";

Object.values(data).forEach(u => {
if (u.email !== user.email) {
txt += u.email + " is typing...";
}
});

document.getElementById("typing").innerText = txt;
});
}
</script>

</body>
</html>
